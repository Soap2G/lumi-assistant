# Skill-router eval cases.
#
# Per Principle 8 of the Skill Library Design Guide, the eval harness
# is the only reliable way to detect the confusability cliff. Each
# entry under `should_match` lists prompts that MUST select that skill
# or agent. `should_not_match` are prompts the router should answer
# with NONE (no skill applies).
#
# When you add a skill, add 3-5 prompts here (Principle 7 step 7).
# When `python run.py` reports a regression on a previously-passing
# skill after a description change, that's the cliff arriving locally
# (Principle 8 warning sign) — fix the description before merging.

should_match:
  - skill: atlas-notebooks
    prompts:
      - "How do I run HZZAnalysis.ipynb?"
      - "Which notebook teaches Higgs to gamma gamma in the outreach repo?"
      - "Do the 13 TeV uproot tutorials run on Binder or do I need SWAN?"
      - "Where is Find_the_Z.ipynb in the notebooks-collection-opendata repo?"

  - skill: sm-analyses
    prompts:
      - "I want to rediscover the Higgs in H to ZZ to 4 leptons."
      - "Walk me through the t-tbar Standard Model measurement with public ATLAS data."
      - "How is WZ to three leptons measured in the 2025 docs?"
      - "I want to redo the H to mu mu Standard Model walkthrough."

  - skill: atlas-opendata
    prompts:
      - "What is the cross-section for DSID 410470?"
      - "Get me the file URLs for ttbar samples in the 2024r-pp release."
      - "What's the kFactor and filter efficiency for physics_short Wjets?"
      - "Switch to the 2025r-evgen-13tev release and list its datasets."

  - skill: cern-opendata
    prompts:
      - "Fetch the metadata for recid 12345 on opendata.cern.ch."
      - "List the files attached to a CMS primary dataset by its DOI."
      - "Find a published LHCb open-data analysis example by exact title."
      - "What's the container image for portal record 27360?"

  - skill: physlite-basics
    prompts:
      - "How do I open a DAOD_PHYSLITE file with uproot?"
      - "Which branches do I read for calibrated muons in PHYSLITE?"
      - "Reconstruct small-R jets and MET from a PHYSLITE file."
      - "Apply the MC normalisation formula when reading PHYSLITE."

  - skill: rucio
    prompts:
      - "How do I list RSEs with the Rucio v38 CLI?"
      - "Show the contents of an internal DID with rucio did show."
      - "Add a replication rule for an mc23 dataset to CERN-PROD."
      - "Find replicas of a non-public dataset on the grid."

  - skill: reana
    prompts:
      - "What's the status of my running REANA workflow?"
      - "Download the outputs of run 7 of myworkflow on reana.cern.ch."
      - "Show me the logs of a failed REANA job."
      - "List my workspaces on the REANA cluster."

  - skill: reana-workflows
    prompts:
      - "How do I write a reana.yaml from scratch for my analysis?"
      - "Which REANA engine should I pick: serial, snakemake, cwl, or yadage?"
      - "Build a REANA workflow that runs my fit script and saves a plot."
      - "Walk me through validate, create, upload, start, download for a new REANA workflow."

  - skill: infra-advisor
    prompts:
      - "I want to run distributed analysis on Open Data and train an ML model."
      - "Which CERN services should I stitch for a reproducible Higgs analysis?"
      - "How should I scale my notebook to a few hundred core-hours at CERN?"
      - "Where do I run a GPU training job at CERN — SWAN, ml.cern.ch, or OpenStack?"

  - skill: verification-before-completion
    prompts:
      - "I just kicked off a REANA workflow — how do I confirm it actually finished and produced the expected outputs?"
      - "Before I tell my supervisor the analysis is done, what should I check on the condor job and the output ROOT files?"
      - "My xrdcp transfer says it completed; how do I verify the file isn't truncated?"
      - "Help me check that my long uproot loop actually processed every event instead of silently swallowing exceptions."

  - skill: cern-docs
    prompts:
      - "How do I submit an HTCondor job from lxplus — what does the official batch documentation say?"
      - "What's the default SWAN session timeout, per the SWAN docs?"
      - "Show me where the GPU flavors are documented in CERN Cloud."
      - "Find me the ATLAS Athena release naming docs on atlas-software."
      - "What endpoints does ml.cern.ch's serving expose, per the ML@CERN docs?"
      - "What do the FTS3 docs say about OAuth2 token support and configuration?"
      - "Find the FTS3 third-party-copy / S3 / multihop docs at fts3-docs.web.cern.ch."

  - skill: fts-rest
    prompts:
      - "Submit a transfer with fts-rest-transfer-submit from an SRM URL to an EOS HTTPS URL."
      - "What's the status of FTS job 4d2c0f8a-... on the pilot endpoint? Use fts-rest-transfer-status."
      - "List my recent FAILED FTS jobs on fts3-atlas.cern.ch:8446."
      - "Cancel an FTS3 transfer job by id with fts-rest-transfer-cancel."
      - "How do I delegate my proxy to the FTS server with fts-rest-delegate?"

  - agent: tutor
    prompts:
      - "Explain invariant mass and why it shows a peak at the Z boson mass."
      - "What does the HZZ tutorial teach about backgrounds and systematics?"
      - "Help me understand why we apply a luminosity factor when normalising MC."

  - skill: hepdata
    prompts:
      - "Get me the HEPData tables for the ATLAS H→γγ cross-section measurement at 13 TeV."
      - "Download the YAML files for HEPData submission ins1849672."
      - "What tables does HEPData have for paper 10.1007/JHEP12(2024)106?"
      - "Find the covariance matrix attached to ATLAS-CONF-2024-019 on HEPData."

  - skill: pdg-lookup
    prompts:
      - "What is the PDG value for the Z boson mass?"
      - "Look up the muon lifetime with its uncertainty."
      - "What's the PDG branching ratio for B0 → K*0 μ+ μ-?"
      - "Quote me the top quark mass from the latest PDG review."

  - skill: read-publication
    prompts:
      - "Read /home/user/atlas-conf-2024-019.pdf and tell me the measured fiducial cross-section."
      - "Get the abstract of arXiv:2401.12345."
      - "What did INSPIRE record 1234567 measure, and at what luminosity?"
      - "Open https://link.aps.org/doi/10.1103/PhysRevLett.130.041801 and find the BR(B→Kνν) result with the systematic breakdown."

  - agent: analysis
    prompts:
      - "Write me a coffea processor that selects ttbar dilepton events."
      - "Plot the dimuon invariant mass with hist and mplhep from a PHYSLITE file."
      - "Compute the pT of the leading jet event-by-event with awkward."
      # Assumption-surfacing prompts: these are intentionally under-specified
      # (release? skim? scope?) so the assistant should clarify before writing
      # code. Routing to `analysis` is still correct — the surfacing behaviour
      # is enforced by AGENTS.md guidelines, not the router.
      - "Plot the invariant mass from my Open Data file."
      - "Write me an analysis script for the ttbar sample."

# Prompts that should NOT pull any skill or agent. Used to test the
# router's "NONE" path. The harness expects the router to abstain.
#
# Two flavours included:
#   1. Off-topic prompts (physics-jokes, OS install help) — abstention
#      protects against eager over-routing.
#   2. Scope-mismatched prompts — phrasings that ask about non-public
#      ATLAS data while only Open Data-flavored skills exist. The
#      `sm-analyses`, `atlas-opendata`, `physlite-basics` skills are
#      `data_scope: open`; routing them to an internal-audience prompt
#      produces a confidently-wrong answer (Principle 5 of the design
#      guide — open-vs-internal leakage).
should_not_match:
  - "What is the speed of light in vacuum?"
  - "Tell me a joke about physicists."
  - "How do I install Python on Ubuntu 24.04?"
  - "What's the weather in Geneva today?"
  - "Explain Bayesian probability in plain English."
  - "Help me debug a Rust borrow checker error."
  - "Summarise today's news headlines."
  - "Translate 'hello world' into French."
  # Scope-mismatch guards (open-only skills should not match internal prompts):
  - "I'm an ATLAS member; help me with the SM ttbar analysis on internal mc23 samples."
  - "Where do I find the DAOD_PHYS for my collaboration analysis ntuple production at lxplus?"
  - "Look up the cross-section for an internal ATLAS DSID that isn't in any Open Data release."
  - "Read a non-public DAOD_PHYSLITE I produced from PanDA on the grid."
  # read-publication cliff guards (off-topic / writing / vague):
  - "Read me a children's book about quarks."
  - "Help me write a paper about the Higgs boson."
  # pdg-lookup cliff guards (concept vs lookup; should route to tutor or NONE):
  - "Why does the Z boson have mass?"
  - "Explain the branching ratio concept in particle physics."
  # hepdata cliff guards (vague data requests; route to atlas-opendata or pdg-lookup):
  - "Find me Higgs data."
  - "Get me the cross-section for ttbar from PDG."
  # fts-rest vs rucio cliff guards (Rucio-driven replication ≠ direct fts-rest):
  - "Add a Rucio replication rule that will trigger an FTS transfer."
  - "Use rucio rule add to enqueue cross-site copies via FTS3."
